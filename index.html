<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Audit System</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14; --surface: #151820; --surface2: #1c2030;
            --border: #2a3050; --accent: #4f8ef7; --green: #34d399;
            --red: #f87171; --text: #e8eaf2; --text2: #8b93b0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

        /* Login Layout */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 30px; width: 100%; max-width: 360px; }
        
        /* App Layout */
        #app-screen { display: none; flex-direction: column; min-height: 100vh; }
        .topbar { background: var(--surface); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
        .stat-item { background: var(--surface); padding: 15px; text-align: center; }
        .stat-val { font-family: 'IBM Plex Mono'; font-weight: 600; font-size: 1.2rem; color: var(--accent); }
        .stat-lab { font-size: 0.7rem; color: var(--text2); text-transform: uppercase; margin-top: 4px; }

        .container { padding: 15px; max-width: 1000px; margin: 0 auto; width: 100%; }
        
        /* Inputs & Tables */
        input { background: var(--surface2); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; outline: none; width: 100%; font-size: 14px; }
        input:focus { border-color: var(--accent); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .full { grid-column: span 2; }
        
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-p { background: var(--accent); color: white; width: 100%; }
        .btn-d { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); font-size: 12px; }

        .table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 12px; font-size: 11px; color: var(--text2); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid var(--border); }

        .map-link { color: var(--accent); text-decoration: none; font-size: 11px; margin-top: 5px; display: block; }
        #error { color: var(--red); font-size: 13px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card">
        <h2 style="margin-bottom: 20px;">ATM Audit Login</h2>
        <div id="error">Invalid Credentials</div>
        <input type="text" id="user" placeholder="Username" style="margin-bottom: 10px;">
        <input type="password" id="pass" placeholder="Password" style="margin-bottom: 20px;">
        <button class="btn btn-p" onclick="login()">Sign In</button>
    </div>
</div>

<div id="app-screen">
    <div class="topbar">
        <strong>🏧 ATM AUDIT</strong>
        <button class="btn btn-d" onclick="logout()">Logout</button>
    </div>

    <div class="stats">
        <div class="stat-item"><div class="stat-val" id="st-total">0</div><div class="stat-lab">Total</div></div>
        <div class="stat-item"><div class="stat-val" id="st-fill" style="color:var(--green)">0</div><div class="stat-lab">Filled</div></div>
        <div class="stat-item"><div class="stat-val" id="st-map" style="color:var(--accent)">0</div><div class="stat-lab">Maps</div></div>
    </div>

    <div class="container">
        <div class="card" style="max-width: none;">
            <div class="form-grid">
                <input id="f-term" placeholder="Terminal #">
                <input id="f-area" placeholder="Area">
                <input id="f-addr" class="full" placeholder="Address">
                <input id="f-map" class="full" placeholder="Google Maps URL">
            </div>
            <button class="btn btn-p" onclick="addATM()">+ ADD TERMINAL</button>
        </div>

        <input type="text" id="search" placeholder="🔍 Search Terminals..." oninput="render()" style="margin-top: 20px;">

        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Sr</th><th>Terminal</th><th>Address</th><th>Area</th><th>Map</th><th>Action</th></tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const CREDS = { u: 'harshkiller', p: 'honey853' };
    const KEY = 'atm_data_v1';

    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === CREDS.u && p === CREDS.p) {
            sessionStorage.setItem('auth', '1');
            init();
        } else {
            document.getElementById('error').style.display = 'block';
        }
    }

    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    function getData() { return JSON.parse(localStorage.getItem(KEY)) || []; }
    function setData(d) { localStorage.setItem(KEY, JSON.stringify(d)); render(); }

    function addATM() {
        const t = document.getElementById('f-term').value;
        if(!t) return;
        const d = getData();
        d.push({ id: Date.now(), t, ar: document.getElementById('f-area').value, ad: document.getElementById('f-addr').value, m: document.getElementById('f-map').value });
        ['f-term','f-area','f-addr','f-map'].forEach(i => document.getElementById(i).value = '');
        setData(d);
    }

    function del(id) { if(confirm('Delete?')) setData(getData().filter(x => x.id !== id)); }

    function update(id, field, val) {
        const d = getData();
        const i = d.findIndex(x => x.id === id);
        d[i][field] = val;
        localStorage.setItem(KEY, JSON.stringify(d));
        updateStats(); // Quiet save
    }

    function updateStats() {
        const d = getData();
        document.getElementById('st-total').innerText = d.length;
        document.getElementById('st-fill').innerText = d.filter(x => x.t).length;
        document.getElementById('st-map').innerText = d.filter(x => x.m).length;
    }

    function render() {
        const query = document.getElementById('search').value.toLowerCase();
        const list = document.getElementById('list');
        const data = getData();
        list.innerHTML = '';
        
        data.forEach((item, idx) => {
            if(item.t.toLowerCase().includes(query) || item.ar.toLowerCase().includes(query)) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:var(--text2)">${idx + 1}</td>
                    <td><input value="${item.t}" onchange="update(${item.id},'t',this.value)"></td>
                    <td><input value="${item.ad}" onchange="update(${item.id},'ad',this.value)"></td>
                    <td><input value="${item.ar}" onchange="update(${item.id},'ar',this.value)"></td>
                    <td>
                        <input value="${item.m}" onchange="update(${item.id},'m',this.value)" style="color:var(--accent)">
                        ${item.m ? `<a href="${item.m}" target="_blank" class="map-link">Open Map ↗</a>` : ''}
                    </td>
                    <td><button class="btn btn-d" onclick="del(${item.id})">Del</button></td>
                `;
                list.appendChild(tr);
            }
        });
        updateStats();
    }

    function init() {
        if(sessionStorage.getItem('auth')) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            render();
        }
    }
    init();
</script>
</body>
</html>
