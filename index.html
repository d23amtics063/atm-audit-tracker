<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Audit</title>
    <style>
        :root { --b: #0d1117; --c: #161b22; --t: #c9d1d9; --a: #58a6ff; --r: #da3633; }
        body { background: var(--b); color: var(--t); font-family: sans-serif; margin: 0; }
        input { background: #010409; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 10px; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-g { background: #238636; color: white; width: 100%; }
        .btn-r { background: transparent; border: 1px solid var(--r); color: var(--r); font-size: 11px; }
        #login, #app { display: none; padding: 20px; }
        .card { background: var(--c); border: 1px solid #30363d; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #30363d; }
        .scroll { overflow-x: auto; background: var(--c); border-radius: 8px; border: 1px solid #30363d; }
    </style>
</head>
<body>

<div id="login" style="max-width: 300px; margin: 100px auto; text-align: center;">
    <h2>ATM Audit</h2>
    <input type="text" id="u" placeholder="User">
    <input type="password" id="p" placeholder="Pass">
    <button class="btn btn-g" onclick="l()">Login</button>
</div>

<div id="app">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <strong>🏧 ATM TRACKER</strong>
        <button class="btn btn-r" onclick="lo()">Logout</button>
    </div>

    <div class="card">
        <input id="t" placeholder="Terminal ID">
        <input id="ad" placeholder="Address">
        <input id="ar" placeholder="Area">
        <input id="m" placeholder="Maps URL">
        <button class="btn btn-g" onclick="add()">Add ATM</button>
    </div>

    <input type="text" id="s" placeholder="🔍 Search..." oninput="draw()">

    <div class="scroll">
        <table>
            <thead><tr><th>Sr.</th><th>ID</th><th>Address</th><th>Area</th><th>Map</th><th>Action</th></tr></thead>
            <tbody id="out"></tbody>
        </table>
    </div>
</div>

<script>
    const AUTH = { u: 'harshkiller', p: 'honey853' };
    const KEY = 'atm_db_final';

    function l() {
        if (document.getElementById('u').value === AUTH.u && document.getElementById('p').value === AUTH.p) {
            sessionStorage.setItem('auth', '1');
            init();
        } else alert('Wrong!');
    }

    function lo() { sessionStorage.clear(); location.reload(); }

    function add() {
        const data = JSON.parse(localStorage.getItem(KEY) || '[]');
        data.push({
            id: Date.now(),
            t: document.getElementById('t').value,
            ad: document.getElementById('ad').value,
            ar: document.getElementById('ar').value,
            m: document.getElementById('m').value
        });
        localStorage.setItem(KEY, JSON.stringify(data));
        ['t','ad','ar','m'].forEach(i => document.getElementById(i).value = '');
        draw();
    }

    function del(id) {
        if(confirm('Delete?')) {
            const data = JSON.parse(localStorage.getItem(KEY)).filter(x => x.id !== id);
            localStorage.setItem(KEY, JSON.stringify(data));
            draw();
        }
    }

    function draw() {
        const data = JSON.parse(localStorage.getItem(KEY) || '[]');
        const q = document.getElementById('s').value.toLowerCase();
        const out = document.getElementById('out');
        out.innerHTML = '';
        data.forEach((item, i) => {
            if(item.t.toLowerCase().includes(q) || item.ar.toLowerCase().includes(q)) {
                out.innerHTML += `<tr>
                    <td>${i+1}</td>
                    <td>${item.t}</td>
                    <td>${item.ad}</td>
                    <td>${item.ar}</td>
                    <td>${item.m ? `<a href="${item.m}" target="_blank" style="color:var(--a)">Map</a>` : '-'}</td>
                    <td><button class="btn-r" onclick="del(${item.id})">Del</button></td>
                </tr>`;
            }
        });
    }

    function init() {
        if(sessionStorage.getItem('auth')) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            draw();
        } else {
            document.getElementById('login').style.display = 'block';
        }
    }
    init();
</script>
</body>
</html>
