<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Audit System</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --accent: #58a6ff; --green: #238636; --red: #da3633;
            --text: #c9d1d9; --text-dim: #8b949e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.5; }

        /* Login */
        #login-page { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: var(--card); border: 1px solid var(--border); padding: 32px; border-radius: 8px; width: 100%; max-width: 340px; }
        
        /* App Layout */
        #app-page { display: none; }
        nav { background: var(--card); padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        
        .container { padding: 16px; max-width: 1100px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 6px; text-align: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }

        /* Forms */
        .entry-form { background: var(--card); border: 1px solid var(--border); padding: 16px; border-radius: 8px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .span-2 { grid-column: span 2; }
        input { background: #0d1117; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; outline: none; margin-bottom: 10px; }
        input:focus { border-color: var(--accent); }
        
        .btn { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-main { background: var(--green); color: white; width: 100%; }
        .btn-del { background: transparent; border: 1px solid var(--red); color: var(--red); }
        .btn-del:hover { background: var(--red); color: white; }

        /* Table */
        .table-scroll { overflow-x: auto; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 750px; }
        th { background: #1b2129; text-align: left; padding: 12px; font-size: 12px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .cell-edit { background: transparent; border: 1px solid transparent; width: 100%; margin: 0; }
        .cell-edit:focus { background: #0d1117; border-color: var(--border); }
        
        .map-btn { color: var(--accent); text-decoration: none; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-box">
        <h2 style="margin-bottom: 20px; text-align: center;">ATM Audit</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn btn-main" onclick="handleLogin()">Sign In</button>
        <p id="err" style="color:var(--red); font-size: 12px; margin-top: 10px; display: none; text-align: center;">Invalid credentials</p>
    </div>
</div>

<div id="app-page">
    <nav>
        <strong>🏧 ATM TRACKER</strong>
        <button class="btn btn-del" onclick="handleLogout()" style="padding: 5px 10px; font-size: 12px;">Logout</button>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-val" id="count-total">0</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-val" id="count-maps" style="color:var(--accent)">0</div><div class="stat-label">Maps</div></div>
        </div>

        <div class="entry-form">
            <div class="grid">
                <input id="in-term" placeholder="Terminal ID">
                <input id="in-area" placeholder="Area">
                <input id="in-addr" class="span-2" placeholder="Full Address">
                <input id="in-link" class="span-2" placeholder="Google Maps Link">
            </div>
            <button class="btn btn-main" onclick="addItem()">Add ATM Entry</button>
        </div>

        <input type="text" id="search" placeholder="🔍 Quick Search..." oninput="renderTable()" style="margin-bottom: 15px; background: var(--card);">

        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th width="50">Sr.</th>
                        <th>Terminal</th>
                        <th>Address</th>
                        <th>Area</th>
                        <th>Location</th>
                        <th width="80">Action</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const CONFIG = { u: 'harshkiller', p: 'honey853', key: 'atm_storage_v4' };

    function handleLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === CONFIG.u && p === CONFIG.p) {
            sessionStorage.setItem('isAuth', 'true');
            checkAuth();
        } else {
            document.getElementById('err').style.display = 'block';
        }
    }

    function handleLogout() {
        sessionStorage.clear();
        location.reload();
    }

    function checkAuth() {
        if(sessionStorage.getItem('isAuth')) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('app-page').style.display = 'block';
            renderTable();
        }
    }

    function getData() { return JSON.parse(localStorage.getItem(CONFIG.key)) || []; }
    function setData(data) { localStorage.setItem(CONFIG.key, JSON.stringify(data)); renderTable(); }

    function addItem() {
        const t = document.getElementById('in-term').value;
        if(!t) return alert('Enter Terminal ID');
        const data = getData();
        data.push({
            id: Date.now(),
            t: t,
            ar: document.getElementById('in-area').value,
            ad: document.getElementById('in-addr').value,
            m: document.getElementById('in-link').value
        });
        ['in-term','in-area','in-addr','in-link'].forEach(id => document.getElementById(id).value = '');
        setData(data);
    }

    function updateItem(id, field, val) {
        const data = getData();
        const i = data.findIndex(x => x.id === id);
        if(i > -1) {
            data[i][field] = val;
            localStorage.setItem(CONFIG.key, JSON.stringify(data));
            updateStats(data);
        }
    }

    function deleteItem(id) {
        if(confirm('Delete this record?')) {
            const data = getData().filter(x => x.id !== id);
            setData(data);
        }
    }

    function updateStats(data) {
        document.getElementById('count-total').innerText = data.length;
        document.getElementById('count-maps').innerText = data.filter(x => x.m).length;
    }

    function renderTable() {
        const data = getData();
        const query = document.getElementById('search').value.toLowerCase();
        const body = document.getElementById('table-body');
        body.innerHTML = '';

        data.forEach((item, index) => {
            if(item.t.toLowerCase().includes(query) || item.ar.toLowerCase().includes(query)) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td><input class="cell-edit" value="${item.t}" onchange="updateItem(${item.id}, 't', this.value)"></td>
                    <td><input class="cell-edit" value="${item.ad}" onchange="updateItem(${item.id}, 'ad', this.value)"></td>
                    <td><input class="cell-edit" value="${item.ar}" onchange="updateItem(${item.id}, 'ar', this.value)"></td>
                    <td>
                        <input class="cell-edit" value="${item.m}" onchange="updateItem(${item.id}, 'm', this.value)" style="color:var(--accent)">
                        ${item.m ? `<a href="${item.m}" target="_blank" class="map-btn">MAP ↗</a>` : ''}
                    </td>
                    <td><button class="btn-del" onclick="deleteItem(${item.id})" style="padding:4px 8px;">Del</button></td>
                `;
                body.appendChild(tr);
            }
        });
        updateStats(data);
    }

    // Initial load
    checkAuth();
</script>
</body>
</html>
